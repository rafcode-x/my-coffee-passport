<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Passport</title>
    <style>
        :root { --primary: #4e342e; --bg: #fcfaf7; --accent: #8d6e63; }
        body { font-family: sans-serif; background: var(--bg); color: var(--primary); padding: 20px; max-width: 900px; margin: auto; }
        .header { border-bottom: 2px solid var(--accent); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .stat-box { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        .stat-box span { display: block; font-size: 24px; font-weight: bold; }
        
        form { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .full-width { grid-column: span 2; }
        button { background: var(--primary); color: white; cursor: pointer; border: none; }
        button:hover { background: var(--accent); }
        .export-btn { background: #2e7d32; margin-top: 10px; }

        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #efebe9; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header">
    <h1>COFFEE PASSPORT</h1>
    <button class="export-btn" onclick="exportToCSV()">Export to CSV</button>
</div>

<div class="stats">
    <div class="stat-box">Countries<span id="stat-countries">0</span></div>
    <div class="stat-box">Varieties<span id="stat-varieties">0</span></div>
    <div class="stat-box">Processes<span id="stat-processes">0</span></div>
</div>

<form id="coffeeForm">
    <input type="text" id="roaster" placeholder="Roaster" required>
    <input type="text" id="name" placeholder="Coffee Name" required>
    <input type="text" id="country" placeholder="Country" required>
    <input type="text" id="region" placeholder="Region">
    <input type="text" id="altitude" placeholder="Altitude (e.g. 1800m)">
    <input type="text" id="variety" placeholder="Variety (e.g. Gesha, Bourbon)" oninput="detectSpecies()">
    <input type="text" id="species" placeholder="Species (Auto-detected)" readonly>
    <select id="process">
        <option value="Washed">Washed</option>
        <option value="Natural">Natural</option>
        <option value="Honey">Honey</option>
        <option value="Anaerobic">Anaerobic</option>
    </select>
    <button type="submit" class="full-width">Add to Passport</button>
</form>

<table id="coffeeTable">
    <thead>
        <tr>
            <th>Name</th>
            <th>Origin</th>
            <th>Variety</th>
            <th>Species</th>
            <th>Process</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
    const speciesMap = {
        'bourbon': 'Arabica', 'typica': 'Arabica', 'gesha': 'Arabica', 'geisha': 'Arabica', 
        'caturra': 'Arabica', 'catuai': 'Arabica', 'sl28': 'Arabica', 'heirloom': 'Arabica',
        'canephora': 'Robusta', 'conilon': 'Robusta', 'excelsa': 'Liberica'
    };

    let coffees = JSON.parse(localStorage.getItem('myCoffees')) || [];

    function detectSpecies() {
        const varInput = document.getElementById('variety').value.toLowerCase();
        document.getElementById('species').value = speciesMap[varInput] || "Arabica (Likely)";
    }

    function updateUI() {
        const tbody = document.querySelector('#coffeeTable tbody');
        tbody.innerHTML = '';
        const countries = new Set();
        const varieties = new Set();
        const processes = new Set();

        coffees.forEach(c => {
            const row = `<tr>
                <td><strong>${c.roaster}</strong><br>${c.name}</td>
                <td>${c.country}<br><small>${c.region}</small></td>
                <td>${c.variety}</td>
                <td>${c.species}</td>
                <td>${c.process}</td>
            </tr>`;
            tbody.innerHTML += row;
            countries.add(c.country);
            varieties.add(c.variety);
            processes.add(c.process);
        });

        document.getElementById('stat-countries').innerText = countries.size;
        document.getElementById('stat-varieties').innerText = varieties.size;
        document.getElementById('stat-processes').innerText = processes.size;
    }

    document.getElementById('coffeeForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const newCoffee = {
            roaster: document.getElementById('roaster').value,
            name: document.getElementById('name').value,
            country: document.getElementById('country').value,
            region: document.getElementById('region').value,
            variety: document.getElementById('variety').value,
            species: document.getElementById('species').value,
            process: document.getElementById('process').value,
        };
        coffees.push(newCoffee);
        localStorage.setItem('myCoffees', JSON.stringify(coffees));
        updateUI();
        e.target.reset();
    });

    function exportToCSV() {
        let csv = "Roaster,Name,Country,Region,Variety,Species,Process\n";
        coffees.forEach(c => {
            csv += `${c.roaster},${c.name},${c.country},${c.region},${c.variety},${c.species},${c.process}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('href', url);
        a.setAttribute('download', 'my_coffee_catalog.csv');
        a.click();
    }

    updateUI();
</script>
</body>
</html>
